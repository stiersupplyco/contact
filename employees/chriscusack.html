<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chris Cusack | Stier Supply Company</title>
    <meta name="description" content="Chris Cusack - Field Manager at Stier Supply Company">
    <meta name="theme-color" content="#0054A6">
    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="../images/logo.png?v=3">
    <link rel="icon" type="image/png" sizes="16x16" href="../images/logo.png?v=3">
    <link rel="apple-touch-icon" href="../images/logo.png?v=3">
    <!-- Open Graph -->
    <meta property="og:title" content="Chris Cusack | Stier Supply Company">
    <meta property="og:description" content="Field Manager">
    <meta property="og:image" content="https://stiersupplyco.github.io/contact/images/logo.png">
    <meta property="og:url" content="https://stiersupplyco.github.io/contact/employees/chriscusack.html">
    <meta property="og:type" content="website">
    <!-- Structured Contact Metadata -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Chris Cusack",
        "jobTitle": "Field Manager",
        "worksFor": {
          "@type": "Organization",
          "name": "Stier Supply Company",
          "url": "https://www.stiersupply.com/"
        },
        "telephone": "+18433448266",
        "email": "chris.cusack@stiersupply.com",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "324 Cameron Circle Suite D",
          "addressLocality": "Myrtle Beach",
          "addressRegion": "SC",
          "postalCode": "29579",
          "addressCountry": "US"
        }
      }
    </script>
    <style>
      :root {
        --blue: #0054A6;
        --blue-light: #00AEEF;
        --text: #222;
        --muted: #666;
        --card: rgba(255, 255, 255, .78);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        font-family:
          Inter,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        background:
          linear-gradient(135deg,
            #f5f7fa,
            #dfe8f2);
        color: var(--text);
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Glass Card */
      .card {
        width: 100%;
        max-width: 420px;
        background: var(--card);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border-radius: 24px;
        padding: 25px 22px;
        text-align: center;
        border:
          1px solid rgba(255, 255, 255, .45);
        box-shadow:
          0 20px 45px rgba(0, 0, 0, .15);
        animation:
          fadeIn .45s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(15px);
        }

        to {
          opacity: 1;
          transform: none;
        }
      }

      /* Logo */
      .logo {
        width: 130px;
        max-width: 40vw;
        margin-bottom: 12px;
        filter:
          drop-shadow(0 6px 10px rgba(0, 0, 0, .22));
      }

      /* Company */
      .company-title {
        font-size: 21px;
        font-weight: 700;
        background:
          linear-gradient(90deg,
            var(--blue),
            var(--blue-light));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 8px;
      }

      /* Random Core Value */
      .core-value {
        margin: 0 0 14px;
        font-size: 13px;
        font-style: italic;
        color: var(--muted);
        min-height: 20px;
      }

      /* Text */
      h1 {
        font-size: 28px;
        margin: 5px 0;
        font-weight: 700;
      }

      h2 {
        font-size: 16px;
        font-weight: 500;
        color: var(--muted);
        margin: 0 0 15px;
      }

      /* Save Button */
      .save-button {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        background:
          linear-gradient(135deg,
            var(--blue),
            #0077cc);
        color: white;
        text-decoration: none;
        padding: 15px;
        border-radius: 14px;
        font-size: 18px;
        font-weight: 700;
        box-shadow:
          0 8px 20px rgba(0, 84, 166, .35);
        transition:
          transform .2s ease,
          box-shadow .2s ease;
      }

      .save-button:hover,
      .save-button:focus-visible {
        transform: translateY(-2px);
        box-shadow:
          0 12px 25px rgba(0, 84, 166, .45);
      }

      .save-button:active {
        transform: scale(.98);
      }

      .save-button svg {
        width: 20px;
        height: 20px;
        flex: none;
      }

      /* Contact Info */
      .info {
        font-size: 14px;
        line-height: 1.25;
        margin-top: 18px;
      }

      .info-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin: 2px 0;
        padding: 3px 8px;
        min-height: 28px;
      }

      .info-row svg {
        width: 16px;
        height: 16px;
        flex: none;
        fill: var(--blue);
      }

      .info-row a {
        color: var(--blue);
        text-decoration: none;
        line-height: 1.2;
        overflow-wrap: anywhere;
      }

      /* Address */
      .address {
        font-size: 13px;
        line-height: 1.25;
        align-items: flex-start;
      }

      /* Keyboard accessibility */
      a:focus-visible {
        outline:
          3px solid #00AEEF;
        outline-offset: 3px;
        border-radius: 8px;
      }

      /* Mobile */
      @media(max-width:400px) {
        .card {
          padding: 20px 16px;
        }

        .logo {
          width: 110px;
        }

        h1 {
          font-size: 24px;
        }

        .save-button {
          font-size: 16px;
        }
      }

      /* Reduced motion */
      @media(prefers-reduced-motion:reduce) {
        * {
          animation: none !important;
          transition: none !important;
        }
      }

      /* Dark Mode */
      @media(prefers-color-scheme:dark) {
        :root {
          --text: #f5f5f5;
          --muted: #bdbdbd;
          --card: rgba(30, 30, 30, .78);
        }

        body {
          background:
            linear-gradient(135deg,
              #101214,
              #202833);
        }

        .card {
          border-color:
            rgba(255, 255, 255, .12);
          box-shadow:
            0 20px 45px rgba(0, 0, 0, .65);
        }

        .info-row svg {
          fill: #70b8ff;
        }

        .info-row a {
          color: #70b8ff;
        }
      }
    </style>
  </head>
  <body>
    <main class="card" aria-label="Digital business card">
      <div class="company-title"> Stier Supply Company </div>
      <div id="core-value" class="core-value"></div>
      <img class="logo" src="../images/logo.png" alt="Stier Supply Company logo">
      <h1> Chris Cusack </h1>
      <h2> Field Manager </h2>
      <a class="save-button" href="../contacts/chriscusack.vcf" aria-label="Save Chris Cusack contact card">
        <!-- Contact Icon -->
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M19 2H8c-1.1 0-2 .9-2 2v3H5c-1.1 0-2 .9-2 2v11c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2v-3h1c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-3 16H5V9h11v9zm3-5h-1v-4c0-1.1-.9-2-2-2H8V4h11v9z" />
        </svg>
        <span>Save Contact</span>
      </a>
      <section class="info" aria-label="Contact information">
        <div class="info-row">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1C10.61 21 3 13.39 3 4c0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z" />
          </svg>
          <a href="tel:+18433448266" aria-label="Call Chris Cusack"> 843-344-8266 </a>
        </div>
        <div class="info-row">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z" />
          </svg>
          <a href="mailto:chris.cusack@stiersupply.com"> chris.cusack@stiersupply.com </a>
        </div>
        <div class="info-row">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 2a10 10 0 100 20 10 10 0 000-20zm6.9 9h-3.1c-.1-1.2-.4-2.3-.8-3.3A8 8 0 0118.9 11zM12 4c.8 1.2 1.4 2.8 1.7 5h-3.4c.3-2.2.9-3.8 1.7-5zM9.9 11H5.1a8 8 0 013.1-5.3c-.5 1.3-1 3.3-1.3 5.3zm0 2c.3 2 .8 4 1.3 5.3A8 8 0 015.1 13h4.8zm2.1 7c-.8-1.2-1.4-2.8-1.7-5h3.4c-.3 2.2-.9 3.8-1.7 5zm2.1-7h4.8a8 8 0 01-3.1 5.3c.5-1.3 1-3.3 1.3-5.3z" />
          </svg>
          <a href="https://www.stiersupply.com/" target="_blank" rel="noopener noreferrer"> www.stiersupply.com </a>
        </div>
        <div class="info-row address">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 2C8.1 2 5 5.1 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.9-3.1-7-7-7zm0 9.5A2.5 2.5 0 1112 6a2.5 2.5 0 010 5.5z" />
          </svg>
          <a href="https://www.google.com/maps/search/?api=1&query=324+Cameron+Circle+Suite+D+Myrtle+Beach+SC+29579" target="_blank" rel="noopener noreferrer"> 324 Cameron Circle, Suite D <br> Myrtle Beach, SC </a>
        </div>
      </section>
    </main>
    <script>
      const coreValues = ['"Stealthy and Stingy"', '"The House Talks"', '"Solve the Problem"', '"Flex with the Customer"', '"Think Like the Contractor"', '"Quality Better Than the Competition"'];
      const coreValueElement = document.getElementById("core-value");
      // Start hidden
      coreValueElement.style.opacity = "0";
      coreValueElement.style.transform = "translateY(5px)";
      // Pick random core value and fade it in
      setTimeout(() => {
        coreValueElement.textContent = coreValues[Math.floor(Math.random() * coreValues.length)];
        coreValueElement.style.transition = "opacity 0.8s ease, transform 0.8s ease";
        coreValueElement.style.opacity = "1";
        coreValueElement.style.transform = "translateY(0)";
      }, 200);
    </script>
  </body>
</html>
