<style>

:root{

--blue:#0054A6;
--blue-light:#00AEEF;
--text:#222;
--muted:#666;
--card:#ffffff;

}


*{

box-sizing:border-box;

}


body{

font-family:
Inter,
-apple-system,
BlinkMacSystemFont,
"Segoe UI",
Roboto,
Helvetica,
Arial,
sans-serif;

background:
linear-gradient(
135deg,
#f5f7fa,
#e8eef5
);

color:var(--text);

min-height:100vh;

margin:0;

padding:20px;

display:flex;

align-items:center;

justify-content:center;

}



/* Main Card */

.card{

width:100%;

max-width:420px;

background:var(--card);

border-radius:22px;

padding:25px 22px;

text-align:center;

border:1px solid rgba(0,0,0,.08);

box-shadow:

0 15px 35px rgba(0,0,0,.15);

animation:fadeIn .45s ease;

}



@keyframes fadeIn{

from{

opacity:0;

transform:translateY(15px);

}

to{

opacity:1;

transform:none;

}

}



/* Logo */

.logo{

width:130px;

max-width:40vw;

margin-bottom:12px;

filter:

drop-shadow(
0 6px 10px rgba(0,0,0,.18)
);

}



/* Company */

.company-title{

font-size:21px;

font-weight:700;

background:

linear-gradient(
90deg,
var(--blue),
var(--blue-light)
);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

margin-bottom:8px;

}



/* Name */

h1{

font-size:28px;

margin:5px 0;

font-weight:700;

}



h2{

font-size:16px;

font-weight:500;

color:var(--muted);

margin:0 0 15px;

}



/* Save Contact Button */

.save-button{

display:flex;

align-items:center;

justify-content:center;

gap:10px;

background:

linear-gradient(
135deg,
var(--blue),
#0077cc
);

color:white;

text-decoration:none;

padding:15px;

border-radius:14px;

font-size:18px;

font-weight:700;

box-shadow:

0 8px 20px rgba(0,84,166,.35);

transition:

transform .2s ease,
box-shadow .2s ease;

}


.save-button:hover,

.save-button:active{

transform:translateY(-2px);

box-shadow:

0 12px 25px rgba(0,84,166,.45);

}


.save-button i{

flex-shrink:0;

}



/* Contact Information */

.info{

font-size:14px;

line-height:1.25;

margin-top:18px;

}


.info-row{

display:flex;

align-items:center;

justify-content:center;

gap:8px;

margin:2px 0;

padding:3px 8px;

min-height:28px;

}


.info-row i{

width:18px;

font-size:14px;

color:var(--blue);

}


.info-row a{

color:var(--blue);

text-decoration:none;

line-height:1.2;

overflow-wrap:anywhere;

}



/* Address */

.address{

font-size:13px;

line-height:1.25;

align-items:flex-start;

}



/* Mobile */

@media(max-width:400px){

.card{

padding:20px 16px;

}


.logo{

width:110px;

}


h1{

font-size:24px;

}


.save-button{

font-size:16px;

}

}



/* Dark Mode */

@media(prefers-color-scheme:dark){


:root{

--text:#f5f5f5;

--muted:#bdbdbd;

--card:#1b1e22;

}


body{

background:

linear-gradient(
135deg,
#101214,
#202833
);

}


.card{

background:#1b1e22;

border-color:

rgba(255,255,255,.08);

box-shadow:

0 15px 35px rgba(0,0,0,.6);

}


.info-row i,

.info-row a{

color:#70b8ff;

}


}

</style>


</head>

<section class="info">

</div>



<div class="info-row">

<i class="fa-solid fa-envelope"></i>

stephen.hallick@stiersupply.com

</a>

</div>



<div class="info-row">

<i class="fa-solid fa-globe"></i>

<a href="https://www.stiersupply.com/" target="_blank">

www.stiersupply.com

</a>

</div>



<div class="info-row address">

<i class="fa-solid fa-location-dot"></i>

target="_blank">

Myrtle Beach, SC

</a>

</div>


</section>


</main>


</body>

</html>
